name: Build Push and Update Manifest

on:
  push:
    branches:
      - main

jobs:
  docker:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set image tag
        run: echo "TAG=$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_ENV

      - name: Docker login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: ./app
          push: true
          tags: |
            shafiur22/app:latest
            shafiur22/app:${{ env.TAG }}

      - name: Update Kubernetes manifest
        run: |
          sed -i "s|image: .*|image: shafiur22/app:${TAG}|g" k8s/deployment.yaml
          cat k8s/deployment.yaml | grep image:

      - name: Commit and push manifest change
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add k8s/deployment.yaml
          if git diff --cached --quiet; then
            echo "No manifest changes to commit"
          else
            git commit -m "Update image tag to ${TAG} [skip ci]"
            git push
          fi
